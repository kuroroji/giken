<svg viewBox="0 0 720 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OBS導入から録画までの4ステップの流れ図。インストール、ソース追加、音声確認、録画設定とテストの順に進む">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .box { fill: #fff; stroke: #111; stroke-width: 1.5; }
    .step { fill: #111; }
    .steptext { font-family: sans-serif; font-size: 12px; fill: #fff; font-weight: 700; }
    .item { font-family: sans-serif; font-size: 14.5px; fill: #111; font-weight: 600; }
    .sub { font-family: sans-serif; font-size: 11.5px; fill: #555; }
    .flow { stroke: #111; stroke-width: 1.5; fill: none; }
  </style>

  <!-- ステップ1 -->
  <rect class="box" x="30" y="60" width="150" height="120" rx="12"/>
  <rect class="step" x="55" y="46" width="100" height="28" rx="14"/>
  <text class="steptext" x="105" y="65" text-anchor="middle">STEP 1</text>
  <text class="item" x="105" y="112" text-anchor="middle">インストール</text>
  <text class="sub" x="105" y="136" text-anchor="middle">公式サイトから</text>
  <text class="sub" x="105" y="152" text-anchor="middle">ウィザードは録画向け</text>

  <line class="flow" x1="184" y1="120" x2="206" y2="120" marker-end="url(#arrow)"/>

  <!-- ステップ2 -->
  <rect class="box" x="210" y="60" width="150" height="120" rx="12"/>
  <rect class="step" x="235" y="46" width="100" height="28" rx="14"/>
  <text class="steptext" x="285" y="65" text-anchor="middle">STEP 2</text>
  <text class="item" x="285" y="112" text-anchor="middle">ソース追加</text>
  <text class="sub" x="285" y="136" text-anchor="middle">ゲーム画面を</text>
  <text class="sub" x="285" y="152" text-anchor="middle">プレビューに映す</text>

  <line class="flow" x1="364" y1="120" x2="386" y2="120" marker-end="url(#arrow)"/>

  <!-- ステップ3 -->
  <rect class="box" x="390" y="60" width="150" height="120" rx="12"/>
  <rect class="step" x="415" y="46" width="100" height="28" rx="14"/>
  <text class="steptext" x="465" y="65" text-anchor="middle">STEP 3</text>
  <text class="item" x="465" y="112" text-anchor="middle">音声確認</text>
  <text class="sub" x="465" y="136" text-anchor="middle">ゲーム音とマイクの</text>
  <text class="sub" x="465" y="152" text-anchor="middle">メーターをチェック</text>

  <line class="flow" x1="544" y1="120" x2="566" y2="120" marker-end="url(#arrow)"/>

  <!-- ステップ4 -->
  <rect class="box" x="570" y="60" width="150" height="120" rx="12"/>
  <rect class="step" x="595" y="46" width="100" height="28" rx="14"/>
  <text class="steptext" x="645" y="65" text-anchor="middle">STEP 4</text>
  <text class="item" x="645" y="112" text-anchor="middle">録画設定・テスト</text>
  <text class="sub" x="645" y="136" text-anchor="middle">出力と映像を確認して</text>
  <text class="sub" x="645" y="152" text-anchor="middle">5分録ってみる</text>

  <!-- 注記 -->
  <text class="sub" x="360" y="228" text-anchor="middle">「画面に映っているものが、そのまま録れる」が分かればOK。迷ったら録画テストで確かめる</text>
</svg>
