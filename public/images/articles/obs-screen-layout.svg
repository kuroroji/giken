<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OBSの画面レイアウト図。中央にプレビュー、下部にシーン、ソース、音声ミキサー、右下にコントロールが並ぶ">
  <style>
    .frame { fill: #fff; stroke: #111; stroke-width: 2; }
    .titlebar { fill: #111; }
    .titletext { font-family: sans-serif; font-size: 13px; fill: #fff; font-weight: 600; }
    .area { fill: #f5f5f5; stroke: #111; stroke-width: 1.5; }
    .area-main { fill: #e8e8e8; stroke: #111; stroke-width: 1.5; }
    .label { font-family: sans-serif; font-size: 15px; fill: #111; font-weight: 600; }
    .sub { font-family: sans-serif; font-size: 12px; fill: #555; }
    .num { fill: #111; }
    .numtext { font-family: sans-serif; font-size: 13px; fill: #fff; font-weight: 700; }
  </style>

  <!-- ウィンドウ枠 -->
  <rect class="frame" x="30" y="20" width="660" height="400" rx="10"/>
  <rect class="titlebar" x="30" y="20" width="660" height="34" rx="10"/>
  <rect class="titlebar" x="30" y="40" width="660" height="14"/>
  <text class="titletext" x="50" y="42">OBS Studio</text>

  <!-- ① プレビュー -->
  <rect class="area-main" x="50" y="70" width="620" height="220" rx="8"/>
  <circle class="num" cx="76" cy="96" r="13"/>
  <text class="numtext" x="76" y="101" text-anchor="middle">1</text>
  <text class="label" x="360" y="175" text-anchor="middle">プレビュー</text>
  <text class="sub" x="360" y="198" text-anchor="middle">いま録画される映像がそのまま映る</text>

  <!-- 下段パネル -->
  <!-- ② シーン -->
  <rect class="area" x="50" y="304" width="130" height="96" rx="8"/>
  <circle class="num" cx="72" cy="326" r="13"/>
  <text class="numtext" x="72" y="331" text-anchor="middle">4</text>
  <text class="label" x="115" y="360" text-anchor="middle">シーン</text>
  <text class="sub" x="115" y="382" text-anchor="middle">最初は1個でOK</text>

  <!-- ③ ソース -->
  <rect class="area" x="192" y="304" width="150" height="96" rx="8"/>
  <circle class="num" cx="214" cy="326" r="13"/>
  <text class="numtext" x="214" y="331" text-anchor="middle">2</text>
  <text class="label" x="267" y="360" text-anchor="middle">ソース</text>
  <text class="sub" x="267" y="382" text-anchor="middle">「何を映すか」を追加</text>

  <!-- ④ 音声ミキサー -->
  <rect class="area" x="354" y="304" width="160" height="96" rx="8"/>
  <circle class="num" cx="376" cy="326" r="13"/>
  <text class="numtext" x="376" y="331" text-anchor="middle">3</text>
  <text class="label" x="434" y="352" text-anchor="middle">音声ミキサー</text>
  <text class="sub" x="434" y="372" text-anchor="middle">ゲーム音とマイクの</text>
  <text class="sub" x="434" y="388" text-anchor="middle">音量メーター</text>

  <!-- ⑤ コントロール -->
  <rect class="area" x="526" y="304" width="144" height="96" rx="8"/>
  <circle class="num" cx="548" cy="326" r="13"/>
  <text class="numtext" x="548" y="331" text-anchor="middle">5</text>
  <text class="label" x="598" y="352" text-anchor="middle">コントロール</text>
  <text class="sub" x="598" y="372" text-anchor="middle">録画開始/停止</text>
  <text class="sub" x="598" y="388" text-anchor="middle">設定ボタン</text>

  <!-- 注記 -->
  <text class="sub" x="360" y="450" text-anchor="middle">数字は本文で説明している順番。よく触るのは ②ソース と ⑤コントロール</text>
</svg>
