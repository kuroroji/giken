<svg viewBox="0 0 720 470" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="機材をそろえる順番の分岐図。家庭用ゲーム機はキャプチャーボードから、PCゲームはOBSでの録画確認から始める">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <style>
    .box { fill: #fff; stroke: #111; stroke-width: 1.5; }
    .head { fill: #111; }
    .head-label { font-family: sans-serif; font-size: 15px; fill: #fff; font-weight: 600; }
    .head-sub { font-family: sans-serif; font-size: 11px; fill: #ccc; }
    .label { font-family: sans-serif; font-size: 15px; fill: #111; font-weight: 600; }
    .item { font-family: sans-serif; font-size: 14px; fill: #111; }
    .sub { font-family: sans-serif; font-size: 12px; fill: #555; }
    .flow { stroke: #111; stroke-width: 1.5; fill: none; stroke-linejoin: round; }
  </style>

  <!-- 分岐元 -->
  <rect class="box" x="235" y="20" width="250" height="56" rx="12"/>
  <text class="label" x="360" y="54" text-anchor="middle">どのゲーム機で実況する?</text>

  <!-- 分岐線（直角） -->
  <path class="flow" d="M 360 76 L 360 106 L 180 106 L 180 134" marker-end="url(#arrow)"/>
  <path class="flow" d="M 360 106 L 540 106 L 540 134" marker-end="url(#arrow)"/>

  <!-- 左ルート: 家庭用ゲーム機 -->
  <rect class="head" x="70" y="140" width="220" height="56" rx="12"/>
  <text class="head-label" x="180" y="164" text-anchor="middle">家庭用ゲーム機</text>
  <text class="head-sub" x="180" y="184" text-anchor="middle">Switch / PS5 など</text>

  <line class="flow" x1="180" y1="196" x2="180" y2="220" marker-end="url(#arrow)"/>
  <rect class="box" x="70" y="226" width="220" height="48" rx="10"/>
  <text class="item" x="180" y="255" text-anchor="middle">① キャプチャーボード</text>

  <line class="flow" x1="180" y1="274" x2="180" y2="298" marker-end="url(#arrow)"/>
  <rect class="box" x="70" y="304" width="220" height="48" rx="10"/>
  <text class="item" x="180" y="333" text-anchor="middle">② マイク</text>

  <line class="flow" x1="180" y1="352" x2="180" y2="376" marker-end="url(#arrow)"/>
  <rect class="box" x="70" y="382" width="220" height="48" rx="10"/>
  <text class="item" x="180" y="411" text-anchor="middle">③ 録画・編集用のPC環境</text>

  <!-- 右ルート: PCゲーム -->
  <rect class="head" x="430" y="140" width="220" height="56" rx="12"/>
  <text class="head-label" x="540" y="164" text-anchor="middle">PCゲーム</text>
  <text class="head-sub" x="540" y="184" text-anchor="middle">Steam など</text>

  <line class="flow" x1="540" y1="196" x2="540" y2="220" marker-end="url(#arrow)"/>
  <rect class="box" x="430" y="226" width="220" height="48" rx="10"/>
  <text class="item" x="540" y="255" text-anchor="middle">① 今のPCでOBS録画を確認</text>

  <line class="flow" x1="540" y1="274" x2="540" y2="298" marker-end="url(#arrow)"/>
  <rect class="box" x="430" y="304" width="220" height="48" rx="10"/>
  <text class="item" x="540" y="333" text-anchor="middle">② マイク</text>

  <line class="flow" x1="540" y1="352" x2="540" y2="376" marker-end="url(#arrow)"/>
  <rect class="box" x="430" y="382" width="220" height="48" rx="10"/>
  <text class="item" x="540" y="411" text-anchor="middle">③ 必要ならPC性能を強化</text>

  <!-- 注記 -->
  <text class="sub" x="360" y="454" text-anchor="middle">キャプチャーボードが必要なのは家庭用ゲーム機ルートだけ</text>
</svg>
