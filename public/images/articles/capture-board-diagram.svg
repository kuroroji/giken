<svg viewBox="0 0 720 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="キャプチャーボードの接続図。ゲーム機の映像をキャプチャーボードがPCとテレビに分配する">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <style>
    .box { fill: #fff; stroke: #111; stroke-width: 1.5; }
    .label { font-family: sans-serif; font-size: 16px; fill: #111; font-weight: 600; }
    .sub { font-family: sans-serif; font-size: 12px; fill: #555; }
    .cable { stroke: #111; stroke-width: 1.5; fill: none; stroke-linejoin: round; }
    .cable-label { font-family: sans-serif; font-size: 12px; fill: #111; }
  </style>

  <!-- ゲーム機 -->
  <rect class="box" x="40" y="160" width="150" height="80" rx="12"/>
  <text class="label" x="115" y="196" text-anchor="middle">ゲーム機</text>
  <text class="sub" x="115" y="218" text-anchor="middle">Switch / PS5 など</text>

  <!-- キャプチャーボード -->
  <rect class="box" x="285" y="160" width="170" height="80" rx="12"/>
  <text class="label" x="370" y="196" text-anchor="middle">キャプチャーボード</text>
  <text class="sub" x="370" y="218" text-anchor="middle">映像と音声を分配</text>

  <!-- テレビ / モニター -->
  <rect class="box" x="530" y="40" width="150" height="80" rx="12"/>
  <text class="label" x="605" y="76" text-anchor="middle">テレビ / モニター</text>
  <text class="sub" x="605" y="98" text-anchor="middle">遅延なくプレイ</text>

  <!-- PC -->
  <rect class="box" x="530" y="280" width="150" height="80" rx="12"/>
  <text class="label" x="605" y="316" text-anchor="middle">PC</text>
  <text class="sub" x="605" y="338" text-anchor="middle">OBS などで録画</text>

  <!-- ゲーム機 → キャプチャーボード（直線） -->
  <line class="cable" x1="190" y1="200" x2="279" y2="200" marker-end="url(#arrow)"/>
  <text class="cable-label" x="234" y="188" text-anchor="middle">HDMI</text>

  <!-- キャプチャーボード → テレビ（直角） -->
  <path class="cable" d="M 455 185 L 492 185 L 492 80 L 524 80" marker-end="url(#arrow)"/>
  <text class="cable-label" x="484" y="130" text-anchor="end">パススルー</text>

  <!-- キャプチャーボード → PC（直角） -->
  <path class="cable" d="M 455 215 L 492 215 L 492 320 L 524 320" marker-end="url(#arrow)"/>
  <text class="cable-label" x="484" y="278" text-anchor="end">USB</text>

  <!-- 注記 -->
  <text class="sub" x="360" y="386" text-anchor="middle">プレイは今まで通りテレビで、録画はPCで。これがキャプチャーボードの役割</text>
</svg>
